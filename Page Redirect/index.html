<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .container {
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2 class="text-center mb-4">📝 Notes App</h2>

    <div class="mb-3">
      <input type="text" id="noteTitle" class="form-control" placeholder="Note Title">
    </div>
    <div class="mb-3">
      <textarea id="noteContent" class="form-control" rows="3" placeholder="Note Content"></textarea>
    </div>
    <div class="mb-3">
      <button id="addBtn" class="btn btn-primary">Add Note</button>
      <button id="clearBtn" class="btn btn-secondary">Clear</button>
    </div>
<button id="updateBtn" class="btn btn-success mt-2" style="display:none;">Update Note</button>
    
    <div class="mb-3">
      <input type="text" id="searchInput" class="form-control" placeholder="Search notes...">
      <button id="searchBtn" class="btn btn-outline-primary mt-2">Search</button>
    </div>

    
    <ul id="notesList" class="list-group">
      
    </ul>
  </div>
  
<div class="mb-3">
  <input type="text" id="searchInput" class="form-control" placeholder="Search notes...">
  <button id="searchBtn" class="btn btn-outline-primary mt-2">Search</button>
</div>

  
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
